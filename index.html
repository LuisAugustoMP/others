<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Others Repository</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #e6edf3;
            --highlight-color: #7ee787;
            --link-color: #4493f8;
            --border-color: #30363d;
            --hover-bg: #161b22;
            --secondary-text: #7d8590;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Menlo', 'Monaco', 'Consolas', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 30px;
        }

        .prompt-line {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .prompt-symbol {
            color: var(--highlight-color);
            font-weight: bold;
        }

        .command {
            color: var(--text-color);
        }

        .description {
            color: var(--secondary-text);
            font-size: 0.9rem;
            margin-left: 24px;
        }

        .directory-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #010409;
            overflow: hidden;
        }

        .directory-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .directory-item:last-child {
            border-bottom: none;
        }

        .directory-item:hover {
            background-color: var(--hover-bg);
        }

        .directory-item a {
            color: var(--link-color);
            text-decoration: none;
            flex-grow: 1;
            display: flex;
            align-items: center;
            font-weight: 500;
        }

        .icon {
            margin-right: 15px;
            font-size: 0.9rem;
            width: 20px;
            text-align: center;
            color: var(--secondary-text);
        }

        .directory-item:hover .icon {
            color: var(--link-color);
        }

        .stats {
            color: var(--secondary-text);
            font-size: 0.85rem;
            font-variant-numeric: tabular-nums;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            color: var(--secondary-text);
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
        }

        @media (max-width: 600px) {
            body { padding: 20px 15px; }
            .stats { display: none; }
            .description { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="prompt-line">
                <span class="prompt-symbol">❯</span>
                <span class="command">ls --projects</span>
            </div>
            <div class="description">Exploring personal workspace /others/</div>
        </div>

        <ul class="directory-list" id="project-list">
            
            <li class="directory-item">
                <a href="domino_mex/index.html">
                    <span class="icon"><i class="fas fa-folder"></i></span>
                    domino_mex/
                </a>
                <span class="stats"><i class="far fa-calendar-alt"></i> 2026-06-14</span>
            </li>
        </ul>

        <div class="footer">
            <span><i class="fas fa-code-branch"></i> main</span>
            <span>1 projects found • Updated 2026-06-14 00:47:52</span>
        </div>
    </div>
</body>
</html>
