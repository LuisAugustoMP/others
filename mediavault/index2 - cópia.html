<!DOCTYPE html>
<html>
<head>
    <style>
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card img { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="grid" id="game-container"></div>

    <script>
        const games = [
            { name: "Red Dead Redemption", image_id: "co2lcv" },
            { name: "Red Dead Redemption", image_id: "co8y6p" },
            { name: "Red Dead Redemption", image_id: "co6wrm" }
        ];

        const container = document.getElementById('game-container');
        games.forEach(game => {
            container.innerHTML += `
                <div class="card">
                    <img src="https://images.igdb.com/igdb/image/upload/t_cover_big/${game.image_id}.jpg" alt="${game.name}">
                    <p>${game.name}</p>
                </div>
            `;
        });
    </script>
</body>
</html>
